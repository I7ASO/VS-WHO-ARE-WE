<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX STUDIO | من نحن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0d0118; /* لون الخلفية الأساسي */
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        .main-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        /* شعار السيرفر */
        .server-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #a855f7;
            box-shadow: 0 0 15px #a855f7;
            margin-bottom: 10px;
        }

        h1 {
            color: #a855f7;
            text-shadow: 0 0 10px #a855f7;
            margin-bottom: 30px;
        }

        /* البطاقة التعريفية */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        /* صورتك الشخصية */
        .my-photo {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            border: 2px solid #fff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .about-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* الخدمات */
        .service {
            background: rgba(168, 85, 247, 0.1);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: right;
            border-right: 4px solid #a855f7;
        }

        .service i {
            color: #a855f7;
            margin-left: 10px;
        }

        /* زر الديسكورد */
        .discord-btn {
            display: block;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://i.postimg.cc/PqdgSDhp/A4273DB5-986C-4720-8FB1-670A32CA1ECA.png" class="server-logo">
        <h1>VORTEX STUDIO</h1>

        <div class="card">
            <img src="https://i.postimg.cc/3RczrbG9/photo-output.png" class="my-photo">
            
            <p class="about-text">
                نحن وجهتكم الأولى في عالم التطوير والبرمجة، نقدم لكم أفضل الحلول التقنية لإدارة وتطوير مشاريعكم باحترافية.
            </p>

            <div class="service"><i class="fab fa-discord"></i> برمجة أنظمة ديسكورد</div>
            <div class="service"><i class="fas fa-code"></i> سكربتات روبلوكس حصرية</div>
            <div class="service"><i class="fas fa-laptop-code"></i> حلول برمجية متكاملة</div>
        </div>

        <a href="https://discord.gg/ghJ3NcvsJs" class="discord-btn">
            <i class="fab fa-discord"></i> انضم لسيرفرنا ديسكورد
        </a>

        <div class="footer">
            جميع الحقوق محفوظة لـ VORTEX STUDIO © 2026
        </div>
    </div>

</body>
</html>
