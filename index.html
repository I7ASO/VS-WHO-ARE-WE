<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX STUDIO | من نحن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إعدادات الألوان العامة */
        :root {
            --primary: #a855f7;
            --bg-dark: #0d0118;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-gray: #b3b3b3;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* الهيدر مع شعار السيرفر */
        .header {
            width: 100%;
            padding: 40px 0;
            background: linear-gradient(to bottom, rgba(168, 85, 247, 0.15), transparent);
            text-align: center;
        }

        .server-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary);
            margin-bottom: 15px;
        }

        .studio-name {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--primary);
            margin: 0;
        }

        /* حاوية المحتوى */
        .container {
            max-width: 700px;
            width: 90%;
            padding: 20px;
        }

        /* بطاقة التعريف */
        .main-card {
            background: var(--card-bg);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 40px;
            padding: 40px 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* صورتك الشخصية */
        .user-photo {
            width: 130px;
            height: 130px;
            border-radius: 30px; /* شكل عصري مربع بحواف دائرية */
            border: 2px solid #fff;
            margin-bottom: 25px;
            transform: rotate(-3deg);
            transition: 0.3s;
        }
        .user-photo:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .about-title {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .about-text {
            line-height: 1.9;
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 35px;
        }

        /* شبكة الخدمات */
        .services-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: right;
        }
